name: Hourly Heartbeat

# Rotates a random dev quote into profile/QUOTE.md every hour and commits it.
# Also appends a timestamped line to profile/HEARTBEAT.log.

on:
  schedule:
    - cron: "5 * * * *"   # every hour at :05 (spread out from other daily jobs)
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: hourly-heartbeat
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Rotate quote + heartbeat file
        run: |
          set -euo pipefail
          mkdir -p profile

          QUOTES=(
            "Code is like humor. When you have to explain it, it's bad. — Cory House"
            "First, solve the problem. Then, write the code. — John Johnson"
            "Simplicity is the soul of efficiency. — Austin Freeman"
            "Make it work, make it right, make it fast. — Kent Beck"
            "The best error message is the one that never shows up. — Thomas Fuchs"
            "Programs must be written for people to read. — Harold Abelson"
            "Talk is cheap. Show me the code. — Linus Torvalds"
            "Any fool can write code that a computer can understand. Good programmers write code that humans can understand. — Martin Fowler"
            "Premature optimization is the root of all evil. — Donald Knuth"
            "Move fast and don't break the build. — Sandeep"
            "Latency is a feature — until it isn't."
            "Ship small. Ship often. Ship green."
            "Cron doesn't sleep, and neither do good backends."
            "The graph stays green when discipline stays daily."
          )

          IDX=$(( RANDOM % ${#QUOTES[@]} ))
          QUOTE="${QUOTES[$IDX]}"
          NOW_UTC=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          NOW_IST=$(TZ=Asia/Kolkata date +"%Y-%m-%d %H:%M:%S IST")

          cat > profile/QUOTE.md <<EOF
          # 💡 Dev Quote (auto-rotated hourly)

          > $QUOTE

          _Last updated: $NOW_UTC ($NOW_IST)_
          EOF

          # Heartbeat log — appended, capped at last 240 entries (~10 days).
          HEARTBEAT="profile/HEARTBEAT.log"
          touch "$HEARTBEAT"
          echo "$NOW_UTC | $QUOTE" >> "$HEARTBEAT"
          tail -n 240 "$HEARTBEAT" > "$HEARTBEAT.tmp" && mv "$HEARTBEAT.tmp" "$HEARTBEAT"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/QUOTE.md profile/HEARTBEAT.log
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: hourly heartbeat + rotated dev quote [skip ci]"
          git push
