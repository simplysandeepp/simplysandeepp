name: Update README Stats Cards

on:
  schedule:
    - cron: "0 3 * * *"   # Runs daily at 3 AM UTC (8:30 AM IST)
  workflow_dispatch:        # Also allows manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GRS_TOKEN }}

      # --- Stats Card ---
      - name: Generate GitHub Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: >
            username=${{ github.repository_owner }}
            &show_icons=true
            &count_private=true
            &include_all_commits=true
            &bg_color=0d1117
            &title_color=22c55e
            &icon_color=22c55e
            &text_color=ffffff
            &hide_border=true
            &rank_icon=github
          path: profile/stats.svg
          token: ${{ secrets.GRS_TOKEN }}

      # --- Top Languages Card ---
      - name: Generate Top Languages Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: >
            username=${{ github.repository_owner }}
            &layout=compact
            &langs_count=8
            &bg_color=0d1117
            &title_color=22c55e
            &text_color=ffffff
            &hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.GRS_TOKEN }}

      # --- Commit & Push SVGs back to repo ---
      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg
          git diff --staged --quiet || git commit -m "chore: update README stats cards [skip ci]"
          git push
