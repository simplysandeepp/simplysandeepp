name: Update README Stats Cards

on:
  schedule:
    - cron: "0 3 * * *"   # Daily at 3 AM UTC (8:30 AM IST)
  workflow_dispatch:        # Manual trigger from Actions tab

permissions:
  contents: write           # ← THIS is what was missing — grants push access

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate GitHub Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: >
            username=simplysandeepp
            &show_icons=true
            &count_private=true
            &include_all_commits=true
            &bg_color=0d1117
            &title_color=22c55e
            &icon_color=22c55e
            &text_color=ffffff
            &hide_border=true
            &rank_icon=github
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Languages Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: >
            username=simplysandeepp
            &layout=compact
            &langs_count=8
            &bg_color=0d1117
            &title_color=22c55e
            &text_color=ffffff
            &hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add profile/stats.svg profile/top-langs.svg
          git diff --staged --quiet || git commit -m "chore: update README stats cards [skip ci]"
          git push
